apiVersion: serving.kserve.io/v1alpha1
kind: LLMInferenceService
metadata:
  name: simulated
spec:
  model:
    uri: hf://sshleifer/tiny-gpt2 # ~2MB test model, simulator ignores it anyway
    name: facebook/opt-125m
  replicas: 1
  router: 
    route: {}
    # Connect to MaaS-enabled gateway
    gateway:
      refs:
        - name: maas-default-gateway
          namespace: openshift-ingress
  template:
    containers:
      # llm-d-inference-sim: OpenAI-compatible HTTP on --port; /health + /ready for probes.
      # Image ENTRYPOINT is /app/llm-d-inference-sim (v0.8.x); args are appended to it.
      # See: https://github.com/llm-d/llm-d-inference-sim
      - name: main
        image: "ghcr.io/llm-d/llm-d-inference-sim:v0.8.2"
        imagePullPolicy: Always
        command: ["/app/llm-d-inference-sim"]
        args:
        - --port
        - "8000"
        - --model
        - facebook/opt-125m
        - --mode
        - random
        # Keep full OpenAI surface (e.g. /v1/embeddings); do not use encoder-only mode.
        - --no-mm-encoder-only
        - --ssl-certfile
        - /var/run/kserve/tls/tls.crt
        - --ssl-keyfile
        - /var/run/kserve/tls/tls.key
        env:
          - name: POD_NAME
            valueFrom:
              fieldRef:
                apiVersion: v1
                fieldPath: metadata.name
          - name: POD_NAMESPACE
            valueFrom:
              fieldRef:
                apiVersion: v1
                fieldPath: metadata.namespace
          - name: POD_IP
            valueFrom:
              fieldRef:
                apiVersion: v1
                fieldPath: status.podIP
        ports:
          - name: https
            containerPort: 8000
            protocol: TCP
        livenessProbe:
          httpGet:
            path: /health
            port: https
            scheme: HTTPS
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        readinessProbe:
          httpGet:
            path: /ready
            port: https
            scheme: HTTPS
